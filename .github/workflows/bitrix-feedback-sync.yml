name: Bitrix feedback sync

on:
  issues:
    types: [opened, reopened, labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, ready_for_review]
  discussion:
    types: [created]
  discussion_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bitrix:
    runs-on: ubuntu-latest
    steps:
      - name: Forward GitHub feedback to Bitrix
        env:
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          ACTION_NAME: ${{ github.event.action }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          EVENT_PATH: ${{ github.event_path }}
        run: |
          if [ -z "$BITRIX_WEBHOOK_URL" ]; then
            echo "BITRIX_WEBHOOK_URL is not configured; skipping Bitrix sync."
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import textwrap
          import urllib.parse
          import urllib.request

          with open(os.environ["EVENT_PATH"], "r", encoding="utf-8") as f:
              event = json.load(f)

          html_url = ""
          title = ""
          body = ""

          for key in ("issue", "pull_request", "discussion", "comment"):
              item = event.get(key)
              if isinstance(item, dict):
                  html_url = html_url or item.get("html_url", "")
                  title = title or item.get("title", "")
                  body = body or item.get("body", "")

          if not title:
              title = f"{os.environ['EVENT_NAME']} {os.environ.get('ACTION_NAME', '')}".strip()

          description = textwrap.dedent(f"""
          GitHub feedback received.

          Repository: {os.environ['REPOSITORY']}
          Event: {os.environ['EVENT_NAME']}
          Action: {os.environ.get('ACTION_NAME', '')}
          Actor: {os.environ['ACTOR']}
          URL: {html_url}

          Body:
          {body[:3500]}

          Suggested status: new
          """).strip()

          fields = {
              "fields[TITLE]": f"GitHub: {title[:180]}",
              "fields[DESCRIPTION]": description,
          }

          data = urllib.parse.urlencode(fields).encode("utf-8")
          req = urllib.request.Request(
              os.environ["BITRIX_WEBHOOK_URL"],
              data=data,
              headers={"Content-Type": "application/x-www-form-urlencoded"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
              print(resp.read().decode("utf-8", errors="replace")[:1000])
          PY
