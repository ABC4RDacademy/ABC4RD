name: Article proposal
description: Propose a source-backed ABC4RD article or essay
title: "Article: "
labels: ["article", "draft"]
body:
  - type: input
    id: title
    attributes:
      label: Working title
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should this article explain?
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Public sources
      description: Add links for every factual claim.
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - draft
        - review
        - approved

