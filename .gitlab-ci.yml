stages:
  - validate
  - deploy

markdown:
  stage: validate
  image: node:lts
  script:
    - npx --yes markdownlint-cli README.md "*.md" "docs/*.md" ".gitlab/**/*.md" ".github/**/*.md" ".bitbucket/**/*.md"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

pages:
  stage: deploy
  image: alpine:latest
  script:
    - test -f public/index.html
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
