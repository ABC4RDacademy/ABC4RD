<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ABC4RD Global Public Signal Top 20 preview</title>
  <desc id="desc">An abstract network-style preview image for a weekly ranking of public signal across blockchain, digital infrastructure, and innovation organizations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#132238"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#06101d" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#93c5fd" stroke-width="3" fill="none">
    <path d="M150 720 C360 530 470 560 650 400 S1030 250 1420 360"/>
    <path d="M220 180 C470 240 620 210 820 320 S1170 520 1460 500"/>
    <path d="M180 500 C390 430 540 470 740 580 S1140 700 1380 650"/>
